<!DOCTYPE html>
<html lang="pt-BR">
<head>
 
   <meta property="og:type" content="website">
    <meta property="og:url" content="https://metadriver.vercel.app/"> 
    <meta property="og:title" content="MetaDriver | Pare de rodar no escuro 🚀">
    <meta property="og:description" content="Defina sua meta, controle a gasolina e veja seu Lucro Líquido em tempo real. A ferramenta essencial para motoristas profissionais.">
    
    <meta property="og:image" content="https://metadriver.vercel.app/og-metadriver.png">
    <meta property="og:image:type" content="image/png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="MetaDriver | Seu Copiloto de Lucros">
    <meta name="twitter:description" content="Controle total dos seus ganhos e gastos. Saiba quanto você realmente lucrou hoje.">
    <meta name="twitter:image" content="https://metadriver.vercel.app/og-metadriver.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!--Script para ler a tela e compartilhar-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>
    <!--QR-Code-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    
</head>

<body class="h-screen w-screen overflow-hidden flex flex-col items-center justify-between p-2 bg-slate-900">

    


    <div class="w-full max-w-md flex flex-col h-full justify-evenly">
        
     
        <div class="flex justify-between items-center px-1">
            <div class="flex items-center gap-2">
                <div class="logo-box w-8 h-8 rounded-lg flex items-center justify-center">
                    <i class="fas fa-bullseye text-blue-500 text-sm"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black text-white brand-text leading-none tracking-tight">
                        META<span class="text-blue-500">DRIVER</span>
                    </h1>
                    <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest leading-none mt-0.5">Seu copiloto de lucros</p>
                </div>
            </div>
            
            <div class="flex gap-2">
                
                <div class="text-right bg-slate-800/80 px-2 py-1 rounded border border-blue-900/30">
                    <div class="text-[8px] text-gray-400 uppercase font-bold">Bruto</div>
                    <div class="text-sm font-bold text-blue-400 leading-none" id="grossHeaderDisplay">R$ 0,00</div>
                </div>
                
                <div class="text-right bg-slate-800/80 px-2 py-1 rounded border border-emerald-900/30">
                    <div class="text-[8px] text-gray-400 uppercase font-bold">Líquido</div>
                    <div class="text-sm font-bold text-emerald-400 leading-none" id="netIncomeDisplay">R$ 0,00</div>
                </div>
            </div>
        </div>

        <div class="card rounded-xl p-2 shadow-lg shadow-slate-900/50">
            <div class="grid grid-cols-3 gap-2">
                <div>
                    <label class="block text-[9px] text-gray-400 font-bold mb-0.5 text-center">INÍCIO</label>
                    <input type="time" id="startTime" class="input-dark w-full rounded-lg py-1 px-1 text-center text-xs font-bold h-8">
                </div>
                <div>
                    <label class="block text-[9px] text-gray-400 font-bold mb-0.5 text-center">META</label>
                    <input type="number" id="goalAmount" class="input-dark w-full rounded-lg py-1 px-1 text-center text-xs font-bold h-8" value="300">
                </div>
                <div>
                    <label class="block text-[9px] text-gray-400 font-bold mb-0.5 text-center">KM</label>
                    <input type="number" id="kmInput" placeholder="0" class="input-dark w-full rounded-lg py-1 px-1 text-center text-xs font-bold border-l-2 border-purple-500 h-8">
                </div>
            </div>
            
            <details class="mt-1 group">
                <summary class="text-[9px] text-blue-400 cursor-pointer hover:text-blue-300 flex justify-center items-center gap-1 font-bold list-none bg-slate-800/50 rounded py-0.5 mt-1">
                    <i class="fas fa-gas-pump text-[9px]"></i> CONFIG GASOLINA
                </summary>
                <div class="grid grid-cols-2 gap-2 mt-1 pt-1 border-t border-slate-700">
                    <div>
                        <label class="block text-[8px] text-gray-500 font-bold mb-0.5 text-center">R$/LITRO</label>
                        <input type="number" step="0.01" id="fuelPrice" placeholder="5.89" class="input-dark w-full rounded p-1 text-center text-xs h-6">
                    </div>
                    <div>
                        <label class="block text-[8px] text-gray-500 font-bold mb-0.5 text-center">KM/L</label>
                        <input type="number" step="0.1" id="consumption" placeholder="10" class="input-dark w-full rounded p-1 text-center text-xs h-6">
                    </div>
                </div>
            </details>
        </div>

        <div class="card rounded-xl p-3 shadow-lg border-l-2 border-blue-500 relative">
            <h2 class="text-[10px] font-bold text-gray-400 uppercase tracking-wide mb-2 flex items-center gap-1">
                <i class="fas fa-wallet text-blue-500"></i> Lançamentos (Brutos)
            </h2>
            
            <div class="grid grid-cols-3 gap-2">
                <div class="relative group">
                    <input type="text" id="uberInput" inputmode="numeric" placeholder="0" class="input-dark w-full rounded-lg pt-4 pb-1 px-0.5 text-center font-bold text-sm h-10 focus:ring-1 ring-white">
                    <span class="absolute top-0.5 left-0 w-full text-center text-[8px] text-gray-400 uppercase font-bold pointer-events-none">Uber</span>
                </div>
                <div class="relative group">
                    <input type="text" id="ninenineInput" inputmode="numeric" placeholder="0" class="input-dark w-full rounded-lg pt-4 pb-1 px-0.5 text-center font-bold text-sm h-10 focus:ring-1 ring-yellow-500">
                    <span class="absolute top-0.5 left-0 w-full text-center text-[8px] text-yellow-500/80 uppercase font-bold pointer-events-none">99Pop</span>
                </div>
                <div class="relative group">
                    <input type="text" id="tipsInput" inputmode="numeric" placeholder="0" class="input-dark w-full rounded-lg pt-4 pb-1 px-0.5 text-center font-bold text-sm h-10 focus:ring-1 ring-emerald-500">
                    <span class="absolute top-0.5 left-0 w-full text-center text-[8px] text-emerald-500/80 uppercase font-bold pointer-events-none">Extra</span>
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-2 w-full">
            <div class="grid grid-cols-2 gap-2">
                <div class="bg-slate-800/50 rounded-lg p-2 border border-red-900/20 flex flex-col justify-center items-center">
                    <div class="text-[9px] text-red-400 uppercase font-bold">Gasolina</div>
                    <div class="text-sm font-bold text-red-400" id="fuelCostDisplay">R$ 0,00</div>
                </div>
                
                <div class="bg-slate-800/50 rounded-lg p-2 border border-blue-900/20 flex flex-col justify-center items-center">
                    <div class="text-[9px] text-blue-400 uppercase font-bold">Hora Bruta</div>
                    <div class="text-sm font-bold text-white" id="hourlyRateDisplay">R$ 0,00</div>
                </div>
            </div>

        
            <div class="bg-slate-800/50 rounded-lg p-2 border border-purple-900/20 flex flex-col justify-center items-center">
                <div class="text-[9px] text-purple-400 uppercase font-bold">Valor do KM</div>
                <div class="text-sm font-bold text-purple-400" id="kmValueDisplay">R$ 0,00</div>
            </div>
        </div>

        <div class="card rounded-xl p-3 shadow-lg bg-gradient-to-r from-slate-800 to-slate-900 border-0">
            <div class="flex justify-between items-end mb-1">
                <div>
                    <div class="text-[9px] text-slate-400 uppercase font-bold">Jornada</div>
                    <div class="text-sm font-mono text-white" id="elapsedTime">0h 00m</div>
                </div>
                <div class="text-right">
                    <div class="text-[9px] text-slate-400 uppercase font-bold">Término</div>
                    <div class="text-sm font-bold text-white" id="estimatedFinish">--:--</div>
                </div>
            </div>
            <div class="w-full bg-slate-700/50 rounded-full h-1.5 mb-2 overflow-hidden">
                <div class="bg-blue-500 h-1.5 rounded-full transition-all duration-700" style="width: 0%" id="progressBar"></div>
            </div>
            <div class="text-center">
                 <span id="remainingAmount" class="text-[10px] font-bold text-slate-300">Falta R$ 0,00</span>
            </div>
        </div>

        <div class="flex flex-col items-center gap-2">
             <button onclick="resetData()" class="text-[9px] text-slate-500 hover:text-red-400 transition-colors uppercase font-bold tracking-wider border border-slate-700 rounded px-2 py-1">
                <i class="fas fa-trash-alt mr-1"></i> Reiniciar
            </button>

            <!--Botão  campanha-->

    <button onclick="CampaignSystem.open()" class="w-full mt-3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white text-[10px] font-bold py-3 rounded-lg shadow-lg animate-pulse flex justify-center items-center gap-2 transition-all">
        <i class="fas fa-rocket"></i> AJUDE A CRIAR O APP OFICIAL
    </button>
    
  

     <!--Fim do Botã campanha-->
     

     <!--Botão share inicio-->

     <div class="flex flex-col items-center gap-2 w-full pb-2">
    
   
    
    <button id="btnShare" onclick="ShareSystem.share()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white text-[10px] font-bold py-3 rounded-lg shadow-lg flex justify-center items-center gap-2 transition-all active:scale-95">
        <i class="fas fa-share-alt"></i> COMPARTILHAR RESULTADO
    </button>
   

       <!--Botão share Fim-->

    </div>

        </div>

    </div>

    <!--Caminhos-->
    <script src="campanha/campanha.js"></script>
    <script src="campanha/campanhahtml.js"></script>
    <script src="popup/popup.js"></script>
    <script src="share/share.js"></script>
    <!--Fim Caminhos-->
     <script src="script.js" defer></script>

</body>
</html>
