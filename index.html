<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>MetaDriver | Seu Copiloto de Lucros</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://metadriver.vercel.app/"> 
    <meta property="og:title" content="MetaDriver | Pare de rodar no escuro 🚀">
    <meta property="og:description" content="Defina sua meta, controle a gasolina e veja seu Lucro Líquido em tempo real. A ferramenta essencial para motoristas profissionais.">

    <meta property="og:image" content="https://metadriver.vercel.app/og-metadriver.png">
    <meta property="og:image:type" content="image/png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="MetaDriver | Seu Copiloto de Lucros">
    <meta name="twitter:description" content="Controle total dos seus ganhos e gastos. Saiba quanto você realmente lucrou hoje.">
    <meta name="twitter:image" content="https://metadriver.vercel.app/og-metadriver.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body class="min-h-screen w-screen bg-slate-900 text-slate-200 font-sans selection:bg-blue-500 selection:text-white pb-10 overflow-y-auto">

    <div class="w-full max-w-md mx-auto flex flex-col gap-3 p-4">

        <div class="flex justify-between items-center mb-1">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center border border-slate-700 shadow-lg">
                    <i class="fas fa-bullseye text-blue-500 text-lg"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black text-white leading-none tracking-tight">
                        META<span class="text-blue-500">DRIVER</span>
                    </h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Seu copiloto</p>
                </div>
            </div>

            <div class="flex gap-2">
                <div class="text-right bg-slate-800 px-3 py-1.5 rounded-lg border border-blue-500/20 shadow-sm">
                    <div class="text-[9px] text-slate-400 uppercase font-bold mb-0.5">Bruto</div>
                    <div class="text-sm font-black text-blue-400 leading-none" id="grossHeaderDisplay">R$ 0,00</div>
                </div>
                <div class="text-right bg-slate-800 px-3 py-1.5 rounded-lg border border-emerald-500/20 shadow-sm">
                    <div class="text-[9px] text-slate-400 uppercase font-bold mb-0.5">Líquido</div>
                    <div class="text-sm font-black text-emerald-400 leading-none" id="netIncomeDisplay">R$ 0,00</div>
                </div>
            </div>
        </div>

        <div class="bg-slate-800 rounded-xl p-3 shadow-lg border border-slate-700/50">
            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="block text-[10px] text-slate-400 font-bold mb-1 text-center">INÍCIO</label>
                    <input type="time" id="startTime" class="w-full bg-slate-900 border border-slate-700 rounded-lg py-2 px-1 text-center text-sm font-bold text-white focus:border-blue-500 outline-none transition-colors">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 font-bold mb-1 text-center">META</label>
                    <input type="number" id="goalAmount" class="w-full bg-slate-900 border border-slate-700 rounded-lg py-2 px-1 text-center text-sm font-bold text-white focus:border-blue-500 outline-none transition-colors" value="300">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 font-bold mb-1 text-center">KM ATUAL</label>
                    <input type="number" id="kmInput" placeholder="0" class="w-full bg-slate-900 border border-slate-700 border-l-4 border-l-purple-500 rounded-lg py-2 px-1 text-center text-sm font-bold text-white focus:border-purple-500 outline-none transition-colors">
                </div>
            </div>

            <details class="mt-3 group">
                <summary class="text-[10px] text-blue-400 font-bold cursor-pointer hover:text-blue-300 flex justify-center items-center gap-2 bg-slate-900/50 rounded py-2 select-none">
                    <i class="fas fa-gas-pump"></i> CONFIGURAR COMBUSTÍVEL
                </summary>
                <div class="grid grid-cols-2 gap-3 mt-3 pt-2 border-t border-slate-700">
                    <div>
                        <label class="block text-[9px] text-slate-500 font-bold mb-1 text-center">R$/LITRO</label>
                        <input type="number" step="0.01" id="fuelPrice" placeholder="5.89" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-center text-sm text-white focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[9px] text-slate-500 font-bold mb-1 text-center">KM/L</label>
                        <input type="number" step="0.1" id="consumption" placeholder="10" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-center text-sm text-white focus:border-blue-500 outline-none">
                    </div>
                </div>
            </details>
        </div>

        <div class="bg-slate-800 rounded-xl p-4 shadow-xl border-l-4 border-blue-500 relative overflow-hidden">
            <h2 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                <i class="fas fa-wallet text-blue-500"></i> Lançamentos (Brutos)
            </h2>

            <div class="grid grid-cols-3 gap-3">
                <div class="relative group">
                    <input type="text" id="uberInput" inputmode="numeric" placeholder="0" class="w-full bg-slate-900 border border-slate-700 rounded-xl pt-5 pb-2 px-1 text-center font-bold text-lg text-white focus:border-white focus:ring-1 focus:ring-white outline-none transition-all">
                    <span class="absolute top-1.5 left-0 w-full text-center text-[9px] text-slate-400 uppercase font-bold pointer-events-none">Uber</span>
                </div>
                <div class="relative group">
                    <input type="text" id="ninenineInput" inputmode="numeric" placeholder="0" class="w-full bg-slate-900 border border-slate-700 rounded-xl pt-5 pb-2 px-1 text-center font-bold text-lg text-white focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 outline-none transition-all">
                    <span class="absolute top-1.5 left-0 w-full text-center text-[9px] text-yellow-500/80 uppercase font-bold pointer-events-none">99Pop</span>
                </div>
                <div class="relative group">
                    <input type="text" id="tipsInput" inputmode="numeric" placeholder="0" class="w-full bg-slate-900 border border-slate-700 rounded-xl pt-5 pb-2 px-1 text-center font-bold text-lg text-white focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition-all">
                    <span class="absolute top-1.5 left-0 w-full text-center text-[9px] text-emerald-500/80 uppercase font-bold pointer-events-none">Extra</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="bg-slate-800/80 rounded-xl p-2 border border-red-500/20 flex flex-col justify-center items-center py-3">
                <div class="text-[9px] text-red-400 uppercase font-bold mb-0.5">Gasolina</div>
                <div class="text-base font-black text-red-400" id="fuelCostDisplay">R$ 0,00</div>
            </div>

            <div class="bg-slate-800/80 rounded-xl p-2 border border-blue-500/20 flex flex-col justify-center items-center py-3">
                <div class="text-[9px] text-blue-400 uppercase font-bold mb-0.5">Hora Bruta</div>
                <div class="text-base font-black text-white" id="hourlyRateDisplay">R$ 0,00</div>
            </div>
        </div>
        
        <div class="bg-slate-800/80 rounded-xl p-2 border border-purple-500/20 flex flex-col justify-center items-center py-2">
            <div class="text-[9px] text-purple-400 uppercase font-bold mb-0.5">Valor do KM Rodado</div>
            <div class="text-base font-black text-purple-400" id="kmValueDisplay">R$ 0,00</div>
        </div>

        <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-xl p-4 shadow-lg border border-slate-700">
            <div class="flex justify-between items-end mb-2">
                <div>
                    <div class="text-[9px] text-slate-400 uppercase font-bold">Jornada</div>
                    <div class="text-sm font-mono font-bold text-white" id="elapsedTime">0h 00m</div>
                </div>
                <div class="text-right">
                    <div class="text-[9px] text-slate-400 uppercase font-bold">Término</div>
                    <div class="text-sm font-bold text-white" id="estimatedFinish">--:--</div>
                </div>
            </div>
            
            <div class="w-full bg-slate-950 rounded-full h-2.5 mb-2 overflow-hidden shadow-inner border border-slate-800">
                <div class="bg-gradient-to-r from-blue-600 to-cyan-500 h-full rounded-full transition-all duration-700 relative" style="width: 0%" id="progressBar">
                    <div class="absolute right-0 top-0 h-full w-1 bg-white/50 blur-[1px]"></div>
                </div>
            </div>
            
            <div class="text-center bg-slate-950/30 rounded py-1">
                 <span id="remainingAmount" class="text-[11px] font-bold text-slate-300">Falta R$ 0,00</span>
            </div>
        </div>

        <div class="flex flex-col items-center gap-3 mt-2">
             <button onclick="resetData()" class="text-[10px] text-slate-500 hover:text-red-400 transition-colors uppercase font-bold tracking-wider border border-slate-700/50 hover:border-red-900/50 rounded-lg px-4 py-2 w-full">
                <i class="fas fa-trash-alt mr-2"></i> Reiniciar
            </button>

            <button onclick="CampaignSystem.open()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white text-xs font-bold py-3.5 rounded-xl shadow-lg shadow-purple-900/20 animate-pulse flex justify-center items-center gap-2 transition-all active:scale-95 border border-white/10">
                <i class="fas fa-rocket"></i> AJUDE A CRIAR O APP OFICIAL
            </button>

            <button id="btnShare" onclick="ShareSystem.share()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold py-3.5 rounded-xl shadow-lg shadow-emerald-900/20 flex justify-center items-center gap-2 transition-all active:scale-95 border border-white/10">
                <i class="fas fa-share-alt"></i> COMPARTILHAR RESULTADO
            </button>
        </div>

    </div>

    <script src="campanha/campanhahtml.js"></script>
    <script src="campanha/campanha.js"></script>
    <script src="popup/popup.js"></script>
    <script src="share/share.js"></script>
    <script src="script.js" defer></script>

</body>
</html>
